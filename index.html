    <meta
      property="og:description"
      content="Route AI work to the best provider across cost, speed, quality, reliability, and privacy."

    <meta property="og:image" content="https://thesluice.vercel.app/thumbnail-social.jpg" />

      name="twitter:description"
      content="Route AI work to the best provider across cost, speed, quality, reliability, and privacy."
    />
    <meta name="twitter:image" content="https://thesluice.vercel.app/thumbnail-social.jpg" />
    <meta
      name="twitter:image:alt"
      content="Sluice decentralized AI routing layer preview with the Sluice logo and route diagram."

    <title>Sluice | Decentralized AI Routing Layer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <script>
      // Apply the saved (or system) theme before first paint to avoid a flash.
      // Keep this logic in sync with src/shared/theme/useTheme.ts.
      (function () {
        try {
          var stored = localStorage.getItem("sluice.theme");
          var pref =
            stored === "light" || stored === "dark" || stored === "system"
              ? stored
              : "system";
          var resolved =
            pref === "system"
              ? window.matchMedia &&
                window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : pref;
          var root = document.documentElement;
          if (resolved === "dark") root.classList.add("dark");
          root.style.colorScheme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta)
            meta.setAttribute(
              "content",
              resolved === "dark" ? "#0a0d16" : "#f2f3f5",
            );
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="app-canvas min-w-80 overflow-x-clip font-sans leading-[1.55] text-sluice-ink antialiased [text-rendering:optimizeLegibility] selection:bg-sluice-routeBlue/30">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
